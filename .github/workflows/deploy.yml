name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger bei Push auf main
  workflow_dispatch: # Manuelles Auslösen möglich

permissions:
  contents: read
  pages: write
  id-token: write

# Verhindert parallele Deployments
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        # WICHTIG: <dein-repo-name> durch den tatsächlichen Repository-Namen ersetzen!
        # Das --base-href Flag ist notwendig, damit Routing korrekt funktioniert.
        run: npm run build -- --configuration production --base-href "/one-year-anniversary/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Angular 17+ baut nach dist/<projektname>/browser, ältere nach dist/<projektname>
          # Pfad ggf. anpassen!
          path: "./dist/one-year-anniversary/browser"

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4